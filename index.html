                                    your verification ✅ · Account verified successfully
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (tabId === 'profile') {
                if (currentUser) {
                    loadUserProfile(currentUser.uid).then(() => {
                        renderProfileEditor();
                    });
                    renderProfileEditor();
                } else {
                    panel.innerHTML = `
                        <div style="padding:40px 20px; text-align:center;">
                            <i class="fas fa-user-circle" style="font-size:5rem; color:#FF385C40; margin-bottom:20px;"></i>
                            <h3 style="margin-bottom:12px;">Sign in required</h3>
                            <p class="text-small" style="margin-bottom:24px;">Login to manage your profile</p>
                            <button class="btn" id="showAuthFromProfile">Login / Sign up</button>
                        </div>
                    `;
                    const showAuthBtn = document.getElementById('showAuthFromProfile');
                    if (showAuthBtn) showAuthBtn.addEventListener('click', () => overlay.classList.add('show'));
                }
            }
        }

        function renderProfileEditor() {
            const data = userProfileData || {};
            panel.innerHTML = `
                <div class="profile-header">
                    <div class="cover-photo" id="coverPreview">
                        ${data.coverUrl ? `<img src="${data.coverUrl}" alt="Cover">` : '<div style="width:100%; height:100%; background:linear-gradient(135deg, #1E1E20, #2A2A2E);"></div>'}
                        <input type="file" id="coverUpload" accept="image/*" style="display:none;">
                        <div class="cover-upload-btn" id="uploadCoverBtn"><i class="fas fa-camera"></i></div>
                    </div>
                    
                    <div class="profile-avatar-section">
                        <div class="profile-avatar" id="avatarPreview">
                            ${data.avatarUrl ? `<img src="${data.avatarUrl}" alt="Avatar">` : '<i class="fas fa-user" style="font-size:2.5rem; color:#FF385C; line-height:80px; text-align:center; width:100%;"></i>'}
                        </div>
                        <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
                        <div class="avatar-upload-btn" id="uploadAvatarBtn"><i class="fas fa-camera"></i></div>
                        <div class="premium-badge" style="margin-bottom:8px;"><i class="fas fa-crown"></i> PREMIUM</div>
                    </div>

                    <div class="profile-stats">
                        <div class="stat-item">
                            <div class="stat-value">48</div>
                            <div class="stat-label">gigs</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">12</div>
                            <div class="stat-label">clients</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">4.9</div>
                            <div class="stat-label">rating</div>
                        </div>
                    </div>
                </div>

                <div class="edit-profile-form">
                    <div class="form-header">
                        <h3>Edit Profile <i class="fas fa-pen edit-icon"></i></h3>
                    </div>

                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="displayName" class="form-control" value="${data.displayName || ''}" placeholder="Your name">
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" class="form-control">
                            <option value="Music" ${data.category === 'Music' ? 'selected' : ''}>Music</option>
                            <option value="Tech" ${data.category === 'Tech' ? 'selected' : ''}>Tech</option>
                            <option value="Events" ${data.category === 'Events' ? 'selected' : ''}>Events</option>
                            <option value="Design" ${data.category === 'Design' ? 'selected' : ''}>Design</option>
                            <option value="Consulting" ${data.category === 'Consulting' ? 'selected' : ''}>Consulting</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Bio</label>
                        <textarea id="bio" class="form-control" placeholder="Tell us about yourself">${data.bio || ''}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Hourly Rate ($)</label>
                        <input type="number" id="hourlyRate" class="form-control" value="${data.hourlyRate || ''}" placeholder="e.g., 150">
                    </div>

                    <div class="portfolio-grid" id="portfolioGrid">
                        ${[1,2,3,4,5,6].map(i => `
                            <div class="grid-item" data-index="${i-1}">
                                ${data[`portfolio_${i-1}`] ? `<img src="${data[`portfolio_${i-1}`]}" alt="Portfolio ${i}">` : `<div style="width:100%; height:100%; background:#161618; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus" style="color:#FF385C40;"></i></div>`}
                                <input type="file" class="portfolio-upload" data-index="${i-1}" accept="image/*" style="display:none;">
                                <div class="overlay"><i class="fas fa-camera" style="color:white; font-size:1.5rem;"></i></div>
                            </div>
                        `).join('')}
                    </div>

                    <button class="btn" id="saveProfileBtn">Save Profile</button>
                    <button class="btn btn-secondary" id="signOutBtnProfile"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                    <div id="profileMessage" style="text-align:center; margin-top:12px;"></div>
                </div>
            `;

            // Attach all event listeners
            document.getElementById('uploadCoverBtn')?.addEventListener('click', () => document.getElementById('coverUpload')?.click());
            document.getElementById('uploadAvatarBtn')?.addEventListener('click', () => document.getElementById('avatarUpload')?.click());

            document.getElementById('coverUpload')?.addEventListener('change', async (e) => {
                const file = e.target.files?.[0];
                if (!file || !currentUser) return;
                try {
                    const url = await uploadToCloudinary(file);
                    await saveUserProfile(currentUser.uid, { coverUrl: url });
                    document.getElementById('coverPreview').innerHTML = `<img src="${url}" alt="Cover">`;
                } catch (error) {
                    document.getElementById('profileMessage').innerHTML = 'Upload failed';
                }
            });

            document.getElementById('avatarUpload')?.addEventListener('change', async (e) => {
                const file = e.target.files?.[0];
                if (!file || !currentUser) return;
                try {
                    const url = await uploadToCloudinary(file);
                    await saveUserProfile(currentUser.uid, { avatarUrl: url });
                    document.getElementById('avatarPreview').innerHTML = `<img src="${url}" alt="Avatar">`;
                } catch (error) {
                    document.getElementById('profileMessage').innerHTML = 'Upload failed';
                }
            });

            document.querySelectorAll('.grid-item').forEach(item => {
                item.addEventListener('click', () => {
                    const input = item.querySelector('.portfolio-upload');
                    if (input) input.click();
                });
            });

            document.querySelectorAll('.portfolio-upload').forEach(input => {
                input.addEventListener('change', async (e) => {
                    const file = e.target.files?.[0];
                    const index = input.dataset.index;
                    if (!file || !currentUser) return;
                    try {
                        const url = await uploadToCloudinary(file);
                        await saveUserProfile(currentUser.uid, { [`portfolio_${index}`]: url });
                        const gridItem = input.closest('.grid-item');
                        if (gridItem) {
                            gridItem.innerHTML = `<img src="${url}" alt="Portfolio"><input type="file" class="portfolio-upload" data-index="${index}" accept="image/*" style="display:none;"><div class="overlay"><i class="fas fa-camera" style="color:white; font-size:1.5rem;"></i></div>`;
                        }
                    } catch (error) {
                        document.getElementById('profileMessage').innerHTML = 'Upload failed';
                    }
                });
            });

            document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
                if (!currentUser) return;
                const updates = {
                    displayName: document.getElementById('displayName')?.value,
                    category: document.getElementById('category')?.value,
                    bio: document.getElementById('bio')?.value,
                    hourlyRate: parseFloat(document.getElementById('hourlyRate')?.value) || null,
                    updatedAt: new Date().toISOString()
                };
                const success = await saveUserProfile(currentUser.uid, updates);
                const msg = document.getElementById('profileMessage');
                if (success) {
                    msg.innerHTML = 'Profile saved!';
                    msg.style.color = '#00ff88';
                    setTimeout(() => msg.innerHTML = '', 2000);
                }
            });

            document.getElementById('signOutBtnProfile')?.addEventListener('click', async () => {
                try { await signOut(auth); } catch (error) { console.warn(error); }
            });
        }

        function setActiveTab(activeId) {
            navItems.forEach(item => {
                if (item.dataset.tab === activeId) item.classList.add('active');
                else item.classList.remove('active');
            });
        }

        tabHome.addEventListener('click', (e) => { e.preventDefault(); currentTab = 'home'; setActiveTab('home'); renderPanel('home'); });
        tabSearch.addEventListener('click', (e) => { e.preventDefault(); currentTab = 'search'; setActiveTab('search'); renderPanel('search'); });
        tabMessages.addEventListener('click', (e) => { e.preventDefault(); currentTab = 'messages'; setActiveTab('messages'); renderPanel('messages'); });
        tabProfile.addEventListener('click', (e) => { e.preventDefault(); currentTab = 'profile'; setActiveTab('profile'); renderPanel('profile'); });

        function setAuthMode(mode) {
            currentAuthMode = mode;
            authPrimaryBtn.innerText = mode === 'login' ? 'Login' : 'Sign up';
            authToggleText.innerText = mode === 'login' ? "Don't have an account?" : 'Already have an account?';
            authToggleBtn.innerText = mode === 'login' ? 'Sign up' : 'Login';
        }

        authToggleBtn.addEventListener('click', () => setAuthMode(currentAuthMode === 'login' ? 'signup' : 'login'));
        authPrimaryBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const pass = authPassword.value.trim();
            if (!email || !pass) { authMessage.innerText = 'fill all fields'; return; }
            try {
                if (currentAuthMode === 'login') await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
                overlay.classList.remove('show');
                authEmail.value = ''; authPassword.value = '';
            } catch (error) { authMessage.innerText = error.message; }
        });

        googleBtn.addEventListener('click', async () => {
            try { await signInWithPopup(auth, provider); overlay.classList.remove('show'); } 
            catch (error) { authMessage.innerText = error.message; }
        });

        closeAuthBtn.addEventListener('click', () => overlay.classList.remove('show'));
        window.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('show'); });

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                overlay.classList.remove('show');
                await loadUserProfile(user.uid);
                if (currentTab === 'profile') renderPanel('profile');
            } else {
                userProfileData = {};
                if (currentTab === 'profile') renderPanel('profile');
            }
        });

        setAuthMode('login');
        setActiveTab('home');
        renderPanel('home');
        overlay.classList.remove('show');
    </script>
</body>
</html>
