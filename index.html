<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GigsCourt · Phase 1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #f5f7fa;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 32px;
      padding: 32px 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.02);
    }
    h2 { margin-bottom: 24px; font-weight: 600; }
    .input-field {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid #e5e9f0;
      border-radius: 30px;
      font-size: 16px;
      margin-bottom: 16px;
      background: #fafbfc;
    }
    .btn {
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 16px;
      font-weight: 600;
      font-size: 16px;
      width: 100%;
      margin-top: 12px;
      cursor: pointer;
    }
    .btn-outline {
      background: white;
      border: 1px solid #e5e9f0;
      color: #1e1e2f;
    }
    .hidden { display: none !important; }
    .error-msg { color: #dc2626; font-size: 14px; margin: 12px 0; text-align: center; }
    .welcome { text-align: center; padding: 40px 0; }
    .welcome h1 { font-size: 28px; margin-bottom: 16px; }
    .welcome p { color: #6b7280; margin-bottom: 32px; }
  </style>
</head>
<body>
<div id="app">
  <!-- Signup View -->
  <div id="signupView">
    <h2>Create account</h2>
    <input type="text" id="businessName" class="input-field" placeholder="Business name" value="Test User">
    <input type="email" id="email" class="input-field" placeholder="Email" value="test@example.com">
    <input type="password" id="password" class="input-field" placeholder="Password" value="password123">
    <button class="btn" id="signupBtn">Sign up</button>
    <p style="text-align: center; margin: 20px 0;">
      <button id="gotoLoginBtn" style="background: none; border: none; color: #0066ff;">Already have an account?</button>
    </p>
    <div id="authError" class="error-msg"></div>
  </div>

  <!-- Login View -->
  <div id="loginView" class="hidden">
    <h2>Welcome back</h2>
    <input type="email" id="loginEmail" class="input-field" placeholder="Email" value="test@example.com">
    <input type="password" id="loginPassword" class="input-field" placeholder="Password" value="password123">
    <button class="btn" id="loginBtn">Log in</button>
    <p style="text-align: center; margin: 20px 0;">
      <button id="gotoSignupBtn" style="background: none; border: none; color: #0066ff;">Create account</button>
    </p>
    <div id="loginError" class="error-msg"></div>
  </div>

  <!-- Verify Email View -->
  <div id="verifyView" class="hidden">
    <h2>Verify your email</h2>
    <p style="margin: 24px 0; color: #4b5563;">We sent a verification link to your email. Click it and then continue.</p>
    <button class="btn" id="checkVerificationBtn">I've verified</button>
    <button class="btn btn-outline" id="resendVerificationBtn" style="margin-top: 12px;">Resend link</button>
  </div>

  <!-- Welcome Screen (after verification) -->
  <div id="welcomeView" class="hidden">
    <div class="welcome">
      <h1>🎉 Welcome to GigsCourt!</h1>
      <p>Your account is verified. More features coming soon...</p>
      <button class="btn btn-outline" id="logoutBtn">Log out</button>
    </div>
  </div>
</div>

<script type="module">
  // Firebase imports
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { 
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, sendEmailVerification, signOut
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { 
    getFirestore, doc, setDoc, getDoc
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyD7dRYpXukVlyV6ipmCfbCXEJ4kp8t1Gmg",
    authDomain: "gigscourt.firebaseapp.com",
    projectId: "gigscourt",
    storageBucket: "gigscourt.firebasestorage.app",
    messagingSenderId: "1055157379736",
    appId: "1:1055157379736:web:215763c63606c2c5a966ed",
    measurementId: "G-BY1YBSYJHV"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // DOM elements
  const signupView = document.getElementById('signupView');
  const loginView = document.getElementById('loginView');
  const verifyView = document.getElementById('verifyView');
  const welcomeView = document.getElementById('welcomeView');
  const authError = document.getElementById('authError');
  const loginError = document.getElementById('loginError');

  // Toggle between signup and login
  document.getElementById('gotoLoginBtn').addEventListener('click', () => {
    signupView.classList.add('hidden');
    loginView.classList.remove('hidden');
  });

  document.getElementById('gotoSignupBtn').addEventListener('click', () => {
    loginView.classList.add('hidden');
    signupView.classList.remove('hidden');
  });

  // Signup
  document.getElementById('signupBtn').addEventListener('click', async () => {
    const businessName = document.getElementById('businessName').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!businessName || !email || !password) {
      authError.textContent = 'All fields required';
      return;
    }

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      
      // Create user profile in Firestore
      await setDoc(doc(db, 'users', cred.user.uid), {
        businessName,
        email,
        phoneNumber: '',
        skills: [],
        profileImage: 'default_avatar',
        rating: 0,
        reviewCount: 0,
        jobsDone: 0,
        location: null,
        createdAt: Date.now(),
        portfolioImages: [],
        bio: '',
        signupMethod: 'email',
        emailVerified: false,
        phoneVerified: false
      });

      // Send verification email
      await sendEmailVerification(cred.user);
      
      signupView.classList.add('hidden');
      verifyView.classList.remove('hidden');
    } catch (err) {
      authError.textContent = err.message;
    }
  });

  // Login
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      loginError.textContent = err.message;
    }
  });

  // Check verification
  document.getElementById('checkVerificationBtn').addEventListener('click', async () => {
    if (auth.currentUser) {
      await auth.currentUser.reload();
      if (auth.currentUser.emailVerified) {
        verifyView.classList.add('hidden');
        welcomeView.classList.remove('hidden');
      } else {
        alert('Email not verified yet. Please check your inbox.');
      }
    }
  });

  // Resend verification
  document.getElementById('resendVerificationBtn').addEventListener('click', async () => {
    if (auth.currentUser) {
      await sendEmailVerification(auth.currentUser);
      alert('Verification email resent!');
    }
  });

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
  });

  // Auth state observer
  onAuthStateChanged(auth, async (user) => {
    if (user && user.emailVerified) {
      // User is signed in and verified
      signupView.classList.add('hidden');
      loginView.classList.add('hidden');
      verifyView.classList.add('hidden');
      welcomeView.classList.remove('hidden');
    } else if (user && !user.emailVerified) {
      // User is signed in but not verified
      signupView.classList.add('hidden');
      loginView.classList.add('hidden');
      verifyView.classList.remove('hidden');
      welcomeView.classList.add('hidden');
    } else {
      // User is signed out
      signupView.classList.remove('hidden');
      loginView.classList.add('hidden');
      verifyView.classList.add('hidden');
      welcomeView.classList.add('hidden');
    }
  });

  // Phone signup code (commented out for Phase 2)
  /*
  // Will be added in next phase
  */
</script>
</body>
</html>
