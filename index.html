<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillSpot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map { height: 400px; }
    .tail-container { @apply max-w-7xl mx-auto px-4; }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <div class="min-h-screen">
    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm border-b">
      <div class="tail-container py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold">S</div>
          <h1 class="text-3xl font-bold text-blue-600">SkillSpot</h1>
        </div>
        <div id="nav-auth" class="hidden items-center gap-4">
          <span id="user-name" class="text-sm font-medium"></span>
          <button onclick="logout()" class="px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-xl">Logout</button>
        </div>
      </div>
    </nav>

    <!-- LOGIN / SIGNUP PAGE -->
    <div id="auth-page" class="tail-container py-12 max-w-md mx-auto">
      <div class="bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-3xl font-bold text-center mb-8">Welcome to SkillSpot</h2>
        
        <!-- Tabs -->
        <div class="flex mb-6 border-b">
          <button onclick="switchTab(0)" id="tab-login" class="flex-1 py-3 font-semibold border-b-2 border-blue-600 text-blue-600">Login</button>
          <button onclick="switchTab(1)" id="tab-signup" class="flex-1 py-3 font-semibold text-gray-500">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-form">
          <input id="login-email" type="email" placeholder="Email" class="w-full px-4 py-3 rounded-2xl border border-gray-200 mb-4 focus:outline-none focus:border-blue-500">
          <input id="login-password" type="password" placeholder="Password" class="w-full px-4 py-3 rounded-2xl border border-gray-200 mb-6 focus:outline-none focus:border-blue-500">
          <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition">Login</button>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signup-form" class="hidden">
          <input id="signup-name" type="text" placeholder="Full Name" class="w-full px-4 py-3 rounded-2xl border border-gray-200 mb-4 focus:outline-none focus:border-blue-500">
          <input id="signup-email" type="email" placeholder="Email" class="w-full px-4 py-3 rounded-2xl border border-gray-200 mb-4 focus:outline-none focus:border-blue-500">
          <input id="signup-password" type="password" placeholder="Password (min 6 chars)" class="w-full px-4 py-3 rounded-2xl border border-gray-200 mb-4 focus:outline-none focus:border-blue-500">
          
          <div class="mb-6">
            <p class="text-sm text-gray-600 mb-2">I am a:</p>
            <div class="flex gap-4">
              <button onclick="selectRole(this)" data-role="customer" class="role-btn flex-1 py-4 border-2 border-gray-200 rounded-2xl hover:border-blue-300 font-medium">Customer</button>
              <button onclick="selectRole(this)" data-role="provider" class="role-btn flex-1 py-4 border-2 border-gray-200 rounded-2xl hover:border-blue-300 font-medium">Service Provider</button>
            </div>
          </div>

          <button onclick="signup()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition">Create Account</button>
        </div>
      </div>
      <p class="text-center text-gray-500 text-sm mt-6">Demo: Works with your Firebase project</p>
    </div>

    <!-- MAIN APP (hidden initially) -->
    <div id="main-app" class="hidden tail-container py-8">

      <!-- CUSTOMER DASHBOARD -->
      <div id="customer-dashboard">
        <h2 class="text-3xl font-bold mb-6">Find Service Providers Near You</h2>
        
        <div class="bg-white rounded-3xl shadow p-6 mb-8">
          <div class="flex flex-col md:flex-row gap-4">
            <input id="search-term" type="text" placeholder="e.g. barber, plumber, makeup artist" class="flex-1 px-5 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-blue-500">
            <div class="flex items-center gap-3">
              <span class="text-sm font-medium whitespace-nowrap">Max distance:</span>
              <input id="max-distance" type="range" min="1" max="50" value="10" class="w-32 accent-blue-600">
              <span id="distance-value" class="font-mono w-10 text-right">10 km</span>
            </div>
            <button onclick="searchProviders()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-semibold">Search</button>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <!-- Map -->
          <div class="lg:col-span-2 bg-white rounded-3xl shadow overflow-hidden">
            <div id="map" class="w-full"></div>
          </div>
          
          <!-- Results list -->
          <div class="bg-white rounded-3xl shadow p-6 overflow-auto max-h-[500px]">
            <h3 class="font-semibold mb-4">Providers near you</h3>
            <div id="results-list" class="space-y-4"></div>
          </div>
        </div>
      </div>

      <!-- PROVIDER DASHBOARD -->
      <div id="provider-dashboard" class="hidden">
        <h2 class="text-3xl font-bold mb-6">Your SkillSpot Profile</h2>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <!-- Profile Form -->
          <div class="bg-white rounded-3xl shadow p-8">
            <h3 class="font-semibold text-lg mb-6">Update Profile</h3>
            
            <input id="provider-service" type="text" placeholder="Service (e.g. Barber, Plumber)" class="w-full px-5 py-3 rounded-2xl border border-gray-200 mb-4">
            <textarea id="provider-bio" placeholder="Tell customers about your experience..." class="w-full px-5 py-3 rounded-2xl border border-gray-200 mb-4 h-32"></textarea>
            
            <div class="mb-6">
              <button onclick="getCurrentLocation()" class="w-full bg-gray-100 hover:bg-gray-200 py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
                📍 Use my current location
              </button>
              <p id="location-status" class="text-xs text-center mt-2 text-gray-500"></p>
            </div>

            <div class="mb-6">
              <p class="text-sm text-gray-600 mb-2">Portfolio Photo</p>
              <input id="portfolio-file" type="file" accept="image/*" class="w-full">
              <button onclick="uploadPortfolioPhoto()" class="mt-3 w-full bg-blue-600 text-white py-3 rounded-2xl">Upload Photo</button>
            </div>

            <button onclick="saveProviderProfile()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-semibold">Save Profile</button>
          </div>

          <!-- Preview -->
          <div class="bg-white rounded-3xl shadow p-8">
            <h3 class="font-semibold text-lg mb-6">Your Current Profile</h3>
            <div id="profile-preview" class="space-y-6">
              <!-- Filled by JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3"></div>

  <script type="module">
    // ================== FIREBASE CONFIG ==================
    // PASTE YOUR CONFIG HERE ↓↓↓ (from Firebase Console → Project Settings → Your apps)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef123456"
    };
    // ====================================================

    // Import Firebase (v12.10.0 - March 2026)
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    let userRole = null;
    let map = null;
    let currentMarkers = [];
    let customerLat = null;
    let customerLng = null;

    // Tailwind script already loaded
    function initTailwind() {
      // Already initialized via CDN
    }

    // ================== HELPER FUNCTIONS ==================
    function showToast(message, color = 'bg-green-600') {
      const toast = document.getElementById('toast');
      toast.className = `flex items-center gap-3 fixed bottom-6 right-6 ${color} text-white px-6 py-4 rounded-2xl shadow-2xl`;
      toast.innerHTML = `<span>${message}</span>`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function showPage(pageId) {
      document.querySelectorAll('#auth-page, #main-app, #customer-dashboard, #provider-dashboard').forEach(el => {
        el.classList.add('hidden');
      });
      if (pageId === 'auth') {
        document.getElementById('auth-page').classList.remove('hidden');
      } else {
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById(pageId).classList.remove('hidden');
      }
    }

    function switchTab(tab) {
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const tabLogin = document.getElementById('tab-login');
      const tabSignup = document.getElementById('tab-signup');

      if (tab === 0) {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        tabLogin.classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
        tabSignup.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
      } else {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        tabSignup.classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
        tabLogin.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
      }
    }

    function selectRole(btn) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('border-blue-600', 'bg-blue-50'));
      btn.classList.add('border-blue-600', 'bg-blue-50');
      window.selectedRole = btn.dataset.role;
    }

    // Haversine distance (km)
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // ================== AUTH ==================
    async function signup() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value.trim();
      const role = window.selectedRole;

      if (!name || !email || !password || !role) {
        showToast('Please fill all fields and select a role', 'bg-red-600');
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          name: name,
          email: email,
          role: role,
          createdAt: new Date(),
          services: role === "provider" ? [] : null,
          bio: "",
          lat: null,
          lng: null,
          photoURL: "",
          portfolio: []
        });

        showToast('Account created successfully!');
        // Auto login will be handled by onAuthStateChanged
      } catch (error) {
        showToast(error.message, 'bg-red-600');
      }
    }

    async function login() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showToast(error.message, 'bg-red-600');
      }
    }

    async function logout() {
      await signOut(auth);
      showPage('auth');
      document.getElementById('nav-auth').classList.add('hidden');
    }

    // ================== FIREBASE AUTH LISTENER ==================
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const data = userDoc.data();
          userRole = data.role;
          document.getElementById('user-name').textContent = data.name;
          document.getElementById('nav-auth').classList.remove('hidden');

          showPage('main-app');
          if (userRole === 'customer') {
            document.getElementById('customer-dashboard').classList.remove('hidden');
            document.getElementById('provider-dashboard').classList.add('hidden');
            initCustomerMap();
          } else {
            document.getElementById('customer-dashboard').classList.add('hidden');
            document.getElementById('provider-dashboard').classList.remove('hidden');
            loadProviderProfile();
          }
        }
      } else {
        currentUser = null;
        showPage('auth');
        document.getElementById('nav-auth').classList.add('hidden');
      }
    });

    // ================== PROVIDER FUNCTIONS ==================
    async function getCurrentLocation() {
      if (!navigator.geolocation) {
        showToast('Geolocation not supported', 'bg-red-600');
        return;
      }
      navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        await setDoc(doc(db, "users", currentUser.uid), {
          lat: lat,
          lng: lng
        }, { merge: true });
        document.getElementById('location-status').innerHTML = `✅ Location set: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        showToast('Location saved!');
        loadProviderProfile();
      }, () => {
        showToast('Unable to get location', 'bg-red-600');
      });
    }

    async function uploadPortfolioPhoto() {
      const fileInput = document.getElementById('portfolio-file');
      const file = fileInput.files[0];
      if (!file) return showToast('Select a photo first', 'bg-red-600');

      try {
        const storageRef = ref(storage, `portfolio/${currentUser.uid}/${Date.now()}_${file.name}`);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);

        const userDoc = await getDoc(doc(db, "users", currentUser.uid));
        let portfolio = userDoc.data().portfolio || [];
        portfolio.push(url);

        await setDoc(doc(db, "users", currentUser.uid), { portfolio: portfolio }, { merge: true });
        showToast('Photo uploaded!');
        loadProviderProfile();
      } catch (e) {
        showToast('Upload failed', 'bg-red-600');
      }
    }

    async function saveProviderProfile() {
      const service = document.getElementById('provider-service').value.trim();
      const bio = document.getElementById('provider-bio').value.trim();

      if (!service) return showToast('Enter your service', 'bg-red-600');

      try {
        await setDoc(doc(db, "users", currentUser.uid), {
          services: [service],
          bio: bio
        }, { merge: true });
        showToast('Profile saved!');
        loadProviderProfile();
      } catch (e) {
        showToast('Save failed', 'bg-red-600');
      }
    }

    async function loadProviderProfile() {
      const userDoc = await getDoc(doc(db, "users", currentUser.uid));
      const data = userDoc.data();
      
      let html = `
        <div class="flex items-center gap-4">
          <img src="${data.photoURL || 'https://via.placeholder.com/80'}" class="w-20 h-20 rounded-2xl object-cover">
          <div>
            <h4 class="font-semibold">${data.name}</h4>
            <p class="text-blue-600">${data.services ? data.services.join(', ') : 'No service set'}</p>
          </div>
        </div>
        <p class="text-sm text-gray-600 mt-4">${data.bio || 'No bio yet'}</p>
        <div class="mt-6">
          <p class="text-xs uppercase tracking-widest text-gray-500">Portfolio</p>
          <div class="flex gap-3 flex-wrap mt-3">
      `;

      if (data.portfolio && data.portfolio.length) {
        data.portfolio.forEach(url => {
          html += `<img src="${url}" class="w-20 h-20 object-cover rounded-2xl">`;
        });
      } else {
        html += `<p class="text-xs text-gray-400">No photos yet</p>`;
      }
      html += `</div></div>`;

      document.getElementById('profile-preview').innerHTML = html;
    }

    // ================== CUSTOMER FUNCTIONS ==================
    function initCustomerMap() {
      if (map) return;
      map = L.map('map').setView([9.0, 7.5], 6); // Nigeria center
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);
    }

    async function searchProviders() {
      const searchTerm = document.getElementById('search-term').value.trim().toLowerCase();
      const maxDist = parseFloat(document.getElementById('max-distance').value);
      document.getElementById('distance-value').textContent = `${maxDist} km`;

      if (!searchTerm) {
        showToast('Enter a service (e.g. barber)', 'bg-red-600');
        return;
      }

      // Get user location if not set
      if (!customerLat) {
        navigator.geolocation.getCurrentPosition(pos => {
          customerLat = pos.coords.latitude;
          customerLng = pos.coords.longitude;
          performSearch(searchTerm, maxDist);
        }, () => {
          showToast('Please allow location access', 'bg-red-600');
        });
        return;
      }
      performSearch(searchTerm, maxDist);
    }

    async function performSearch(searchTerm, maxDist) {
      const q = query(collection(db, "users"), where("role", "==", "provider"));
      
      onSnapshot(q, (snapshot) => {
        const providers = [];
        snapshot.forEach(doc => {
          const p = doc.data();
          if (p.services && p.services.some(s => s.toLowerCase().includes(searchTerm))) {
            if (p.lat && p.lng) {
              const dist = calculateDistance(customerLat, customerLng, p.lat, p.lng);
              if (dist <= maxDist) {
                providers.push({ ...p, distance: dist.toFixed(1) });
              }
            }
          }
        });

        // Clear old markers
        currentMarkers.forEach(m => map.removeLayer(m));
        currentMarkers = [];

        // Add markers
        providers.forEach(p => {
          const marker = L.marker([p.lat, p.lng]).addTo(map)
            .bindPopup(`
              <b>${p.name}</b><br>
              ${p.services.join(', ')}<br>
              📍 ${p.distance} km away<br>
              <small>${p.bio || ''}</small>
            `);
          currentMarkers.push(marker);
        });

        // Render list
        let html = '';
        if (providers.length === 0) {
          html = `<p class="text-gray-400">No providers found within ${maxDist} km</p>`;
        } else {
          providers.sort((a,b) => a.distance - b.distance).forEach(p => {
            html += `
              <div class="border border-gray-100 rounded-2xl p-4 hover:bg-gray-50">
                <div class="flex justify-between">
                  <div>
                    <div class="font-semibold">${p.name}</div>
                    <div class="text-sm text-blue-600">${p.services.join(', ')}</div>
                  </div>
                  <div class="text-right">
                    <div class="text-xs font-mono bg-gray-100 px-3 py-1 rounded-full">${p.distance} km</div>
                  </div>
                </div>
                ${p.portfolio && p.portfolio.length ? `<img src="${p.portfolio[0]}" class="mt-3 w-full h-32 object-cover rounded-xl">` : ''}
              </div>`;
          });
        }
        document.getElementById('results-list').innerHTML = html;

        if (providers.length > 0) {
          map.fitBounds(providers.map(p => [p.lat, p.lng]));
        }
      });
    }

    // Distance slider live update
    document.getElementById('max-distance').addEventListener('input', (e) => {
      document.getElementById('distance-value').textContent = `${e.target.value} km`;
    });

    // Initial setup
    window.onload = () => {
      switchTab(0); // default to login
      initTailwind();
      
      // If config is still default, show alert
      if (firebaseConfig.apiKey === "YOUR_API_KEY") {
        setTimeout(() => {
          showToast('⚠️ Please replace firebaseConfig in the code!', 'bg-yellow-600');
        }, 800);
      }
    };

    // Expose functions to window for onclick handlers
    window.switchTab = switchTab;
    window.selectRole = selectRole;
    window.signup = signup;
    window.login = login;
    window.logout = logout;
    window.getCurrentLocation = getCurrentLocation;
    window.uploadPortfolioPhoto = uploadPortfolioPhoto;
    window.saveProviderProfile = saveProviderProfile;
    window.searchProviders = searchProviders;
  </script>
</body>
</html>
