<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GigsCourt</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:sans-serif;margin:0}
#map{height:400px}
.provider{border:1px solid #ddd;padding:10px;margin:10px}
</style>
</head>

<body>

<h2>GigsCourt</h2>

<div id="auth">
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="signup()">Join Free</button>
<button onclick="login()">Sign In</button>
</div>

<hr>

<h3>Create / Edit Profile</h3>

<input id="name" placeholder="name">

<input id="address" placeholder="address">
<button onclick="geocodeAddress()">Set Location</button>

<input id="primaryService" placeholder="primary service">

<input id="customService" placeholder="custom service">

<input type="file" id="profilePhoto">

<input type="file" id="workPhotos" multiple>

<button onclick="saveProfile()">Save Profile</button>

<hr>

<h3>Search Providers</h3>

<input id="searchService" placeholder="service">
<input type="range" id="radius" min="1" max="50" value="10">
<span id="radiusValue">10km</span>

<button onclick="searchProviders()">Search</button>

<div id="results"></div>

<hr>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR KEY",
authDomain: "skillspot95611.firebaseapp.com",
projectId: "skillspot95611",
};

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)

window.signup = async () => {

let email = document.getElementById("email").value
let pass = document.getElementById("password").value

await createUserWithEmailAndPassword(auth,email,pass)

alert("Account created")

}

window.login = async () => {

let email = document.getElementById("email").value
let pass = document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,pass)

alert("Logged in")

}

let map = L.map("map").setView([6.45,3.39],12)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

let userLat
let userLng

window.geocodeAddress = async () => {

let address = document.getElementById("address").value

let url = `https://nominatim.openstreetmap.org/search?format=json&q=${address}`

let res = await fetch(url)

let data = await res.json()

userLat = data[0].lat
userLng = data[0].lon

L.marker([userLat,userLng]).addTo(map)

}

async function uploadToCloudinary(file){

let form = new FormData()

form.append("file",file)

form.append("upload_preset","YOUR_PRESET")

let res = await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload",{method:"POST",body:form})

let data = await res.json()

return data.secure_url

}

window.saveProfile = async () => {

let user = auth.currentUser

let profilePhoto = document.getElementById("profilePhoto").files[0]

let workFiles = document.getElementById("workPhotos").files

let profileUrl = await uploadToCloudinary(profilePhoto)

let workUrls = []

for(let file of workFiles){

let url = await uploadToCloudinary(file)

workUrls.push(url)

}

await setDoc(doc(db,"users",user.uid),{

name:document.getElementById("name").value,

address:document.getElementById("address").value,

lat:parseFloat(userLat),

lng:parseFloat(userLng),

primaryService:document.getElementById("primaryService").value,

customService:document.getElementById("customService").value,

profilePhoto:profileUrl,

workPhotos:workUrls,

rating:0,

jobsCompleted:0,

verified:false

})

alert("Profile saved")

}

window.searchProviders = async () => {

let service = document.getElementById("searchService").value.toLowerCase()

let radius = document.getElementById("radius").value

let snapshot = await getDocs(collection(db,"users"))

let resultsDiv = document.getElementById("results")

resultsDiv.innerHTML=""

snapshot.forEach(docu=>{

let u = docu.data()

let dist = getDistance(userLat,userLng,u.lat,u.lng)

if(dist <= radius){

if(u.primaryService.toLowerCase().includes(service) || (u.customService && u.customService.toLowerCase().includes(service))){

let div=document.createElement("div")

div.className="provider"

div.innerHTML=`

<img src="${u.profilePhoto}" width="80">

<h4>${u.name}</h4>

<p>${u.primaryService}</p>

<p>${dist.toFixed(1)} km away</p>

`

resultsDiv.appendChild(div)

L.marker([u.lat,u.lng]).addTo(map)

}

}

})

}

function getDistance(lat1,lon1,lat2,lon2){

let R=6371

let dLat=(lat2-lat1)*Math.PI/180

let dLon=(lon2-lon1)*Math.PI/180

let a=

Math.sin(dLat/2)*Math.sin(dLat/2)+

Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*

Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c

}

</script>

</body>
</html>
