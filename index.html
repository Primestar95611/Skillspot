<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GigsCourt</title>
  <meta name="theme-color" content="#FF385C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <!-- Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#FF385C' },
          fontFamily: {
            display: ['"Clash Display"', 'sans-serif'],
            body:    ['"DM Sans"', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <!-- React 18 -->

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel (JSX transform) -->

  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:'DM Sans',sans-serif;background:#F8F8FA;-webkit-text-size-adjust:100%;overscroll-behavior:none}
    #root{min-height:100dvh;display:flex;flex-direction:column}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .spin{animation:spin .7s linear infinite}
    .fade-up{animation:fadeUp .35s ease both}
    input[type=range]{-webkit-appearance:none;height:4px;border-radius:9999px;outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:2.5px solid #FF385C;box-shadow:0 4px 12px rgba(255,56,92,.35)}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:2.5px solid #FF385C}
    .search-input:focus{outline:none;border-color:#FF385C !important;box-shadow:0 0 0 3px rgba(255,56,92,.12) !important;background:#fff !important}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skeleton{background:linear-gradient(90deg,#f0f0f5 25%,#e4e4eb 50%,#f0f0f5 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite}
  </style>

</head>
<body>

  <!-- ============================================================
       TEMPORARY DEBUG TOOL — REMOVE AFTER FIXING ERRORS
       This adds a green floating button on screen.
       Tap it to see all console errors on your iPhone.
       DELETE these 2 lines once the app is working correctly.
  =============================================================== -->

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>

  <script>eruda.init();</script>

  <!-- ============================================================
       END OF TEMPORARY DEBUG TOOL
  =============================================================== -->

  <div id="root"></div>

  <!--
    COMPONENT FILES — loaded in dependency order.
    Each file uses type="text/babel" so Babel transforms JSX.
    Leaf components first, App.js last.
  -->

  <script type="text/babel" src="./components/Header.js"      data-presets="react"></script>

  <script type="text/babel" src="./components/ProviderCard.js" data-presets="react"></script>

  <script type="text/babel" src="./components/ProfileGrid.js"  data-presets="react"></script>

  <script type="text/babel" src="./ProfilePage.js"             data-presets="react"></script>

  <script type="text/babel" src="./MapComponent.js"            data-presets="react"></script>

  <script type="text/babel" src="./CloudinaryUpload.js"        data-presets="react"></script>

  <script type="text/babel" src="./App.js"                     data-presets="react"></script>

</body>
</html>
