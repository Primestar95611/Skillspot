/* Scrollbar hide */
::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }

/* Range slider */
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: #E5E7EB;
  border-radius: 99px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--red);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(255,56,92,0.4);
}
input[type=range]::-moz-range-thumb {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--red);
  cursor: pointer;
  border: none;
}

/* Toggle switch */
.toggle-track {
  width: 52px; height: 28px;
  border-radius: 99px;
  transition: background 0.3s;
  position: relative;
  cursor: pointer;
}
.toggle-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: white;
  position: absolute;
  top: 3px;
  transition: left 0.3s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

/* Card hover */
.provider-card { transition: transform 0.2s, box-shadow 0.2s; }
.provider-card:active { transform: scale(0.97); }

/* Bottom nav */
.bottom-nav { box-shadow: 0 -1px 0 rgba(0,0,0,0.06); }

/* Pulse dot */
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
.pulse { animation: pulse-dot 1.6s ease-in-out infinite; }

/* Fade in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.35s ease forwards; }

/* Map placeholder */
.map-grid {
  background:
    linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  background-color: #f0f4f8;
}

/* Image overlay gradient */
.img-gradient {
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%);
}

function SearchTab({ onViewProvider, providers, likedIds, onLike }) {
  const [query, setQuery] = React.useState('');
  const [radius, setRadius] = React.useState(10);

  const filtered = providers.filter(p => {
    const matchQuery = p.name.toLowerCase().includes(query.toLowerCase())
      || p.service.toLowerCase().includes(query.toLowerCase());
    const matchRadius = p.distance <= radius;
    return matchQuery && matchRadius;
  });

  return (
    <div className="pb-28">
      <div className="px-5 pt-6">
        <h1 className="text-2xl font-extrabold text-gray-900 mb-4" style={{ fontFamily: 'Syne' }}>Search</h1>

        {/* Search input */}
        <div className="relative mb-5">
          <div className="absolute left-4 top-1/2 -translate-y-1/2">
            <Icon.Search size={18} color="#9CA3AF" />
          </div>
          <input
            type="text"
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Barber, mechanic, tailor..."
            className="w-full pl-11 pr-4 py-3.5 rounded-2xl text-sm outline-none border"
            style={{ background: '#F9FAFB', border: '1px solid #E5E7EB', fontFamily: 'DM Sans' }}
          />
        </div>

        {/* Distance slider */}
        <div className="rounded-2xl p-4 mb-5" style={{ background: '#F9FAFB', border: '1px solid #E5E7EB' }}>
          <div className="flex items-center justify-between mb-3">
            <span className="text-sm font-semibold text-gray-700">Search Radius</span>
            <span className="font-bold text-base" style={{ color: 'var(--red)', fontFamily: 'Syne' }}>{radius} km</span>
          </div>
          <input
            type="range"
            min="1"
            max="50"
            value={radius}
            onChange={e => setRadius(Number(e.target.value))}
          />
          <div className="flex justify-between mt-1.5">
            <span className="text-xs text-gray-400">1 km</span>
            <span className="text-xs text-gray-400">50 km</span>
          </div>
        </div>

        {/* Results count */}
        <p className="text-sm text-gray-500 mb-4">
          <span className="font-bold text-gray-900">{filtered.length}</span> providers within {radius} km
          {query && <span> matching "<strong>{query}</strong>"</span>}
        </p>

        {/* Results */}
        {filtered.length === 0 ? (
          <div className="text-center py-16">
            <div className="text-5xl mb-4">🔍</div>
            <p className="font-bold text-gray-700" style={{ fontFamily: 'Syne' }}>No results found</p>
            <p className="text-sm text-gray-400 mt-1">Try a wider radius or different keyword</p>
          </div>
        ) : (
          <div className="flex flex-col gap-4">
            {filtered.map(p => (
              <ProviderCard
                key={p.id}
                provider={p}
                onClick={onViewProvider}
                liked={likedIds.includes(p.id)}
                onLike={onLike}
              />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

  function handleLike(id) {
    setLikedIds(prev =>
      prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
    );
  }

  function handleViewProvider(provider) {
    setViewingProvider(provider);
    window.scrollTo(0, 0);
  }

  function handleBack() {
    setViewingProvider(null);
    window.scrollTo(0, 0);
  }

  // If viewing a provider, show detail full-screen
  if (viewingProvider) {
    return (
      <div>
        <ProfileDetail provider={viewingProvider} onBack={handleBack} />
      </div>
    );
  }

  return (
    <div className="max-w-md mx-auto min-h-screen">
      <TopHeader tab={tab} />

      {/* Tab content — add top padding for fixed header */}
      <div style={{ paddingTop: 64 }}>
        {tab === 'home' && (
          <HomeTab
            providers={providers}
            onViewProvider={handleViewProvider}
            likedIds={likedIds}
            onLike={handleLike}
          />
        )}
        {tab === 'search' && (
          <SearchTab
            providers={providers}
            onViewProvider={handleViewProvider}
            likedIds={likedIds}
            onLike={handleLike}
          />
        )}
        {tab === 'map' && (
          <MapTab providers={providers} onViewProvider={handleViewProvider} />
        )}
        {tab === 'profile' && (
          <ProfileTab />
        )}
      </div>

      <BottomNav activeTab={tab} onChange={setTab} />
    </div>
  );
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
