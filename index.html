<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>GigsCourt — Find Local Services</title>

  <!-- Leaflet CSS -->

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Google Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <!-- App Stylesheet -->

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── SPLASH / AUTH SCREEN ─── -->

  <div id="authScreen" class="screen active">
    <div class="auth-bg">
      <div class="auth-blob blob1"></div>
      <div class="auth-blob blob2"></div>
      <div class="auth-blob blob3"></div>
    </div>
    <div class="auth-container">
      <div class="brand">
        <span class="brand-icon">◈</span>
        <h1 class="brand-name">GigsCourt</h1>
        <p class="brand-tagline">Discover skilled people around you</p>
      </div>

```
  <!-- Tab toggle -->
  <div class="auth-tabs">
    <button class="auth-tab active" data-tab="login">Sign In</button>
    <button class="auth-tab" data-tab="signup">Create Account</button>
  </div>

  <!-- Login Form -->
  <div id="loginForm" class="auth-form active">
    <div class="field-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" />
    </div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
    </div>
    <p class="auth-error" id="loginError"></p>
    <button class="btn-primary" id="loginBtn">Sign In</button>
  </div>

  <!-- Signup Form -->
  <div id="signupForm" class="auth-form">
    <div class="field-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Jane Smith" />
    </div>
    <div class="field-group">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@example.com" />
    </div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="min 6 characters" />
    </div>
    <p class="auth-error" id="signupError"></p>
    <button class="btn-primary" id="signupBtn">Create Account</button>
  </div>
</div>
```

  </div>

  <!-- ─── MAIN APP SCREEN ─── -->

  <div id="appScreen" class="screen">

```
<!-- Top Bar -->
<header class="top-bar">
  <div class="top-bar-inner">
    <span class="top-brand">◈ GigsCourt</span>
    <button class="icon-btn" id="logoutBtn" title="Sign out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<!-- ── HOME TAB ── -->
<div id="homeTab" class="tab-content active">
  <div class="home-hero">
    <h2 class="hero-title">Find services<br/><em>near you</em></h2>
    <p class="hero-sub">Tap Search to discover local professionals</p>
  </div>

  <!-- Category chips -->
  <div class="section-label">Browse Categories</div>
  <div class="category-scroll" id="categoryChips"></div>

  <!-- Notification panel for providers -->
  <div class="section-label" id="notifLabel" style="display:none">Live Requests</div>
  <div id="providerNotifications"></div>

  <!-- Nearby quick list -->
  <div class="section-label">Nearby Providers</div>
  <div id="nearbyList" class="card-list"></div>
</div>

<!-- ── SEARCH TAB ── -->
<div id="searchTab" class="tab-content">
  <div class="search-header">
    <div class="search-bar-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="barber, plumber, tutor…" />
    </div>
    <div class="filter-row">
      <span class="filter-label">Radius: <strong id="radiusValue">10 km</strong></span>
      <input type="range" id="radiusSlider" min="1" max="50" value="10" class="radius-slider" />
    </div>
  </div>

  <!-- Map -->
  <div id="mapContainer" class="map-container">
    <div id="map"></div>
    <button class="map-locate-btn" id="locateMeBtn">📍 My Location</button>
  </div>

  <!-- Results -->
  <div id="searchResults" class="card-list"></div>
</div>

<!-- ── PROFILE TAB ── -->
<div id="profileTab" class="tab-content">
  <div id="profileView"></div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-tab="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn" data-tab="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </button>
  <button class="nav-btn" data-tab="profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </button>
</nav>
```

  </div>

  <!-- ─── PROVIDER PROFILE MODAL ─── -->

  <div id="profileModal" class="modal-overlay">
    <div class="modal-sheet">
      <button class="modal-close" id="closeModal">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- ─── LOADING OVERLAY ─── -->

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loader-ring"></div>
  </div>

  <!-- Firebase SDK -->

  <script type="module">
    import { initApp } from './App.js';
    initApp();
  </script>

</body>
</html>
